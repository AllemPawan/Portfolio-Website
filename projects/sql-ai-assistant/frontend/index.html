<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL AI Assistant — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 850: '#172033', 900: '#0f172a', 950: '#020617' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'Fira Code', 'monospace'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .msg-enter { animation: fadeSlideIn 0.3s ease-out; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .thinking-dot { animation: pulse 1.2s ease-in-out infinite; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body class="bg-surface-950 text-slate-300 dark h-screen overflow-hidden flex flex-col">

  <!-- Top bar -->
  <header class="shrink-0 h-14 border-b border-white/5 flex items-center px-4 gap-4 backdrop-blur-lg" style="background: rgba(15, 23, 42, 0.85);">
    <div class="flex items-center gap-3">
      <span class="text-lg font-bold text-white tracking-tight">SQL AI <span class="text-primary-400">Assistant</span></span>
      <span id="status-badge" class="text-xs px-2 py-0.5 rounded-full bg-slate-800 text-slate-400">disconnected</span>
    </div>
    <div class="flex-1"></div>
    <button id="upload-btn" class="text-xs px-3 py-1.5 rounded-lg bg-primary-600 hover:bg-primary-500 text-white font-medium transition-colors">
      Upload DB
    </button>
    <button id="clear-history-btn" class="text-xs px-3 py-1.5 rounded-lg bg-surface-800 hover:bg-surface-700 text-slate-400 font-medium transition-colors">
      Clear
    </button>
    <a href="../index.html" class="text-xs px-3 py-1.5 rounded-lg bg-surface-800 hover:bg-surface-700 text-slate-400 font-medium transition-colors">
      Back
    </a>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 shrink-0 border-r border-white/5 flex flex-col bg-surface-900/50 hidden md:flex">
      <div class="p-4 border-b border-white/5">
        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Database</h3>
        <div id="db-info" class="text-sm text-slate-400">No database loaded</div>
      </div>
      <div class="p-4 border-b border-white/5">
        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Sample Questions</h3>
        <div id="sample-questions" class="space-y-1 text-sm"></div>
      </div>
      <div class="flex-1 overflow-y-auto p-4">
        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">History</h3>
        <div id="history-list" class="space-y-1 text-sm"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center py-16 text-slate-500">
          <div class="text-5xl mb-4">🗄️</div>
          <p class="text-lg font-medium text-slate-400 mb-1">Upload a SQLite database to begin</p>
          <p class="text-sm">Ask questions in plain English, get SQL + results + charts</p>
        </div>
      </div>

      <!-- Input -->
      <div class="shrink-0 p-4 border-t border-white/5">
        <form id="query-form" class="flex gap-3">
          <input
            id="query-input"
            type="text"
            placeholder="Ask a question about your data..."
            class="flex-1 px-4 py-3 rounded-xl bg-surface-900 border border-slate-700/60 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-sm transition-colors"
            disabled
          />
          <button
            type="submit"
            id="query-submit"
            class="px-5 py-3 rounded-xl bg-primary-600 hover:bg-primary-500 disabled:bg-slate-800 disabled:text-slate-600 text-white font-semibold text-sm transition-colors"
            disabled
          >
            Ask
          </button>
        </form>
      </div>
    </main>
  </div>

  <!-- Upload modal -->
  <div id="upload-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-surface-900 border border-slate-800 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="text-lg font-bold text-white mb-4">Upload Database</h2>
      <div
        id="drop-zone"
        class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center cursor-pointer hover:border-primary-500/50 transition-colors"
      >
        <div class="text-4xl mb-3">📁</div>
        <p class="text-slate-400 text-sm mb-1">Drop a <code class="text-primary-400">.db</code> file here</p>
        <p class="text-slate-500 text-xs">or click to browse</p>
      </div>
      <input id="file-input" type="file" accept=".db" class="hidden" />
      <div id="upload-status" class="mt-4 text-sm text-center hidden"></div>
      <div class="flex gap-3 mt-4">
        <button id="upload-cancel" class="flex-1 py-2 rounded-lg bg-surface-800 hover:bg-surface-700 text-slate-400 text-sm font-medium transition-colors">Cancel</button>
        <button id="upload-submit" class="flex-1 py-2 rounded-lg bg-primary-600 hover:bg-primary-500 text-white text-sm font-medium transition-colors disabled:bg-slate-800 disabled:text-slate-600" disabled>Upload</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
